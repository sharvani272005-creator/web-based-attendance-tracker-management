<!DOCTYPE html>
<html>
<head>
    <title>Edit User | AttendEase</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='teacher_dashboard.css') }}">
</head>
<body>
<style>/* Container for the form */
.form-container {
    max-width: 500px;
    margin: 50px auto;
    background: #ffffff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    font-family: 'Segoe UI', sans-serif;
}

h2 {
    color: #1f2937;
    margin-bottom: 25px;
    font-weight: 600;
    text-align: center;
}

/* Label styling */
label {
    display: block;
    margin-bottom: 8px;
    font-weight: 500;
    color: #4b5563;
    font-size: 0.9rem;
}

/* Inputs and Select boxes */
input[type="text"], 
select {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    box-sizing: border-box; /* Crucial for padding/width alignment */
    font-size: 1rem;
    transition: border-color 0.2s;
}

input[type="text"]:focus, 
select:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

/* Button styling */
button[type="submit"] {
    width: 100%;
    background-color: #2563eb;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.3s;
}

button[type="submit"]:hover {
    background-color: #1d4ed8;
}

/* Back link */
.back-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    text-decoration: none;
    color: #6b7280;
    font-size: 0.85rem;
}

.back-link:hover {
    color: #2563eb;
}</style>
<body style="background-color: #f3f4f6; padding: 20px;">

<div class="form-container">
    <h2>Edit User</h2>

    <form method="POST">
        <label>Full Name</label>
        <input type="text" name="full_name" value="{{ user['full_name'] }}" required>

        <label>Password</label>
        <input type="text" name="password" value="{{ user['password'] }}" required>

        <label>Role</label>
        <select name="role">
            <option value="teacher" {% if user['role'] == 'teacher' %}selected{% endif %}>Teacher</option>
            <option value="student" {% if user['role'] == 'student' %}selected{% endif %}>Student</option>
        </select>

        <button type="submit">Update User Profile</button>
    </form>

    <a href="/admin" class="back-link">← Back to Dashboard</a>
</div>

</body>
</html>
