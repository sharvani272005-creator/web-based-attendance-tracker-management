<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AttendEase | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

<div class="login-page">

    <div class="login-left">
        <h1>Welcome to AttendEase</h1>
        <p>
            The modern solution for academic attendance tracking.<br>
            Secure, efficient, and transparent management for teachers
            and students alike.
        </p>
    </div>

    <div class="login-right">
        <div class="login-card">

            <h2>Sign In</h2>
            <p class="subtext">Enter your credentials to access your account</p>

            <div class="role-tabs">
                <button type="button" class="role-btn active" onclick="setRole('teacher', this)">Teacher</button>
                <button type="button" class="role-btn" onclick="setRole('student', this)">Student</button>
                <button type="button" class="role-btn" onclick="setRole('admin', this)">Admin</button>
            </div>

            <form method="POST">
                <input type="hidden" name="role" id="role" value="teacher">

                <label>Username</label>
                <input type="text" name="username" required>

                <label>Password</label>
                <input type="password" name="password" required>

                {% if error %}
                    <p class="error">{{ error }}</p>
                {% endif %}

                <button type="submit" class="login-btn">
                    Sign In as <span id="roleText">Teacher</span>
                </button>
            </form>

        </div>
    </div>

</div>

<script>
function setRole(role, btn) {
    document.getElementById("role").value = role;
    document.getElementById("roleText").innerText =
        role.charAt(0).toUpperCase() + role.slice(1);

    document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}
</script>

</body>
</html>
